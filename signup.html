<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arangkada – Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet" />
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- NAV -->
<nav id="navbar">
  <div class="nav-container">
    <div class="logo">
      <img src="assets/yellow logo.png" alt="Arangkada Logo" />
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="booking.html">Book</a></li>
      <li><a href="signup.html" class="active">Sign Up</a></li>
      <li><a href="login.html">Log In</a></li>
      <li class="hamburger-wrap">
        <div class="hamburger" id="hamburger">
          <span></span><span></span><span></span>
        </div>
        <!-- Dropdown Menu -->
        <div class="hamburger-dropdown" id="hamburgerDropdown">
          <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
          <a href="book.html"><i class="fa-solid fa-car"></i> Book a Vehicle</a>
          <a href="signup.html"><i class="fa-solid fa-user-plus"></i> Sign Up</a>
          <div class="dropdown-divider"></div>
          <a href="#"><i class="fa-solid fa-phone"></i> Contact Us</a>
          <a href="#"><i class="fa-solid fa-circle-info"></i> About</a>
        </div>
      </li>
    </ul>
  </div>
</nav>

<!-- SIGNUP HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <p>Join the adventure</p>
    <h1>Create Your Account</h1>

    <!-- Signup Form -->
    <form class="signup-form" id="signupForm">
      <div class="form-field">
        <i class="fa-solid fa-user field-icon"></i>
        <input type="text" id="fullName" class="field-input" placeholder="Full Name" required />
      </div>

      <div class="form-field">
        <i class="fa-solid fa-envelope field-icon"></i>
        <input type="email" id="email" class="field-input" placeholder="Email Address" required />
      </div>

      <div class="form-field">
        <i class="fa-solid fa-lock field-icon"></i>
        <input type="password" id="password" class="field-input" placeholder="Password" required />
      </div>

      <div class="form-field">
        <i class="fa-solid fa-lock field-icon"></i>
        <input type="password" id="confirmPassword" class="field-input" placeholder="Confirm Password" required />
      </div>

      <button type="submit" class="search-btn">
        Sign Up <i class="fa-solid fa-user-plus"></i>
      </button>
    </form>

    <!-- Validation Message -->
    <div id="signupError" class="search-error"></div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
